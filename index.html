<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration System</title>

<style>

/* ===== BACKGROUND ===== */
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#1d2671,#c33764);
    color:white;
    padding:20px;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

/* TITLE */
h2{
    text-align:center;
}

/* INPUTS */
label{
    font-weight:600;
}

input, select{
    width:100%;
    padding:10px;
    margin:8px 0 15px;
    border:none;
    border-radius:8px;
    background:rgba(255,255,255,0.25);
    color:white;
}

option{ color:black; }

/* GENDER */
.gender{
    display:flex;
    gap:20px;
    margin-bottom:15px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#ff9966,#ff5e62);
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* SEARCH */
.search{
    margin-top:25px;
}

.search input{
    background:white;
    color:black;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    background:white;
    color:black;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#ff5e62;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:#f2f2f2;
}

</style>
</head>

<body>

<div class="container">

<h2>🎓 Student Registration</h2>

<form id="studentForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Roll Number</label>
<input type="text" id="roll" required>

<label>Department</label>
<select id="dept" required>
<option value="">Select Department</option>
<option>CSE</option>
<option>IT</option>
<option>AI & ML</option>
<option>ECE</option>
</select>

<label>Gender</label>
<div class="gender">
<label><input type="radio" name="gender" value="Male" required> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Other"> Other</label>
</div>

<label>Contact</label>
<input type="tel" id="contact" pattern="[0-9]{10}" required>

<button type="submit">Register Student</button>

</form>

<!-- SEARCH -->
<div class="search">
<input type="text" id="searchBox"
placeholder="🔍 Search students..."
onkeyup="searchStudent()">
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Department</th>
<th>Gender</th>
<th>Contact</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>

</div>

<script>

/* LOAD SAVED DATA */
let students = JSON.parse(localStorage.getItem("students")) || [];
displayStudents();

/* REGISTER STUDENT */
document.getElementById("studentForm").addEventListener("submit", function(e){
    e.preventDefault();

    let student = {
        name: name.value,
        roll: roll.value,
        dept: dept.value,
        gender: document.querySelector('input[name="gender"]:checked').value,
        contact: contact.value
    };

    students.push(student);

    localStorage.setItem("students", JSON.stringify(students));

    displayStudents();
    this.reset();
});

/* DISPLAY TABLE */
function displayStudents(){
    let table = document.getElementById("studentTable");
    table.innerHTML="";

    students.forEach(s=>{
        table.innerHTML += `
        <tr>
        <td>${s.name}</td>
        <td>${s.roll}</td>
        <td>${s.dept}</td>
        <td>${s.gender}</td>
        <td>${s.contact}</td>
        </tr>`;
    });
}

/* SEARCH FUNCTION */
function searchStudent(){
    let value = document.getElementById("searchBox").value.toLowerCase();
    let rows = document.querySelectorAll("#studentTable tr");

    rows.forEach(row=>{
        row.style.display =
            row.textContent.toLowerCase().includes(value)
            ? ""
            : "none";
    });
}

</script>

</body>
</html>
